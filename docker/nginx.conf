upstream api_upstream {
    server api:3000;
    keepalive 32;
}

upstream web_upstream {
    server web:80;
    keepalive 32;
}

# ── Rate limiting zones ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=120r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name fakeintellect.ca www.fakeintellect.ca;
    return 301 https://fakeintellect.ca$request_uri;
}

# ── HTTPS main ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name fakeintellect.ca www.fakeintellect.ca;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options          SAMEORIGIN;
    add_header X-Content-Type-Options   nosniff;
    add_header Referrer-Policy          strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API proxy ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Health endpoint ──────────────────────────────────────────────
    location /health {
        proxy_pass http://api_upstream;
        access_log off;
    }

    # ── Angular SPA ──────────────────────────────────────────────────
    location / {
        limit_req zone=web_limit burst=30 nodelay;

        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA fallback — let Angular router handle 404s
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://web_upstream;
    }

    # ── Static asset caching ─────────────────────────────────────────
    location ~* \.(js|css|woff2|ico|svg|png|jpg|webp)$ {
        proxy_pass http://web_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
