<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="16" fill="#0a0a09"/>
  <!-- Diamond outer border -->
  <rect x="16" y="16" width="68" height="68"
        fill="rgba(163,230,53,0.12)"
        stroke="#a3e635"
        stroke-width="5"
        transform="rotate(45 50 50)"/>
  <!-- Diamond inner accent -->
  <rect x="28" y="28" width="44" height="44"
        fill="rgba(163,230,53,0.08)"
        stroke="rgba(163,230,53,0.3)"
        stroke-width="1.5"
        transform="rotate(45 50 50)"/>
</svg>